<!DOCTYPE html>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preload" href="https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.min.js" as="script">
</head>
<body>

  <!-- Static noise -->

  <!-- Scan lines -->

  <!-- Ambient orbs -->
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="orb orb-3" aria-hidden="true"></div>

  <!-- Floating particles -->
  <div class="bg-particles" aria-hidden="true">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    
  </div>

  <!-- Hero -->
  <section class="hero" id="hero">
    <nav>
      <div class="nav-left">
        <div class="nav-left-resume">
          <a href="#resume">Resume</a>
        </div>
        <a href="#projects">KJFGJKFJKFBÌ</a>
        <a href="#about">Interests</a>
      </div>
      <div class="nav-right">
        <a href="#contact">Contact</a>
        <a href="https://www.instagram.com/noah.hup/" target="_blank" rel="noopener noreferrer">Instagram</a>
      </div>
    </nav>

    <div class="name-hero">
      <p class="name-kicker">Portfolio</p>
      <h1 class="name-title-wrap" id="name-title">
        <span class="name-title name-line" data-text="Noah"></span><br>
        <span class="name-title name-line" data-text="Hupfeld"></span>
      </h1>
      <p class="name-hint">↓ &nbsp; scroll</p>
    </div>
  </section>

  <!-- ── Resume ── -->
  <section class="page-section" id="resume">
    <div class="section-inner">
      <div class="section-header">
        <span class="section-kicker">01</span>
        <h2 class="section-title">Resume</h2>
      </div>
      <div class="resume-list" id="resume-list"></div>
    </div>
  </section>

  <!-- ── Projects ── -->
  <section class="page-section" id="projects">
    <div class="section-inner">
      <div class="section-header">
        <span class="section-kicker">02</span>
        <h2 class="section-title">Projects</h2>
      </div>
      <div class="projects-grid" id="projects-grid"></div>
    </div>
  </section>

  <!-- ── About ── -->
  <section class="page-section" id="about">
    <div class="section-inner">
      <div class="section-header">

  <!-- ── Contact ── -->
  <section class="page-section" id="contact">
    <div class="section-inner">
      <div class="section-header">
        <span class="section-kicker">04</span>
        <h2 class="section-title">Contact</h2>
      </div>
      <div class="contact-body">
        <p class="contact-intro">Have a question, idea, or just want to say hi?</p>
        <form class="contact-form" id="contact-form" action="https://formspree.io/f/mgopnbgj" method="POST" novalidate>
          <div class="contact-row">
            <div class="contact-field">
              <label class="contact-label" for="contact-name">Name</label>
              <input class="contact-input" id="contact-name" name="name" type="text" placeholder="Your name" autocomplete="name" required>
            </div>
            <div class="contact-field">
              <label class="contact-label" for="contact-email">Email</label>
              <input class="contact-input" id="contact-email" name="email" type="email" placeholder="your@email.com" autocomplete="email" required>
            </div>
          </div>
          <div class="contact-field">
            <label class="contact-label" for="contact-message">Message</label>
            <textarea class="contact-input contact-textarea" id="contact-message" name="message" placeholder="Write your message…" rows="5" required></textarea>
          </div>
          <div class="contact-footer">
            <p class="contact-status" id="contact-status" aria-live="polite"></p>
            <button class="contact-btn" type="submit">
              <span class="contact-btn-label">Send</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <!-- Scroll-in section nav -->
  <nav class="bottom-nav" aria-label="Sections">
    <a class="bottom-nav-item" href="#resume">Resume</a>
    <a class="bottom-nav-item" href="#projects">Projects</a>
    <a class="bottom-nav-item" href="#about">Interests</a>
    <a class="bottom-nav-item" href="#contact">Contact</a>
  </nav>

  <footer class="site-footer">© 2026 Noah Hupfeld</footer>

  <script src="blob.js"></script>
  <script src="grain.js"></script>
  <script src="cursor.js"></script>
  <script src="portfolio-data.js"></script>
  <script>
    /* ── Split letters & stagger reveal ── */
    document.querySelectorAll('.name-line').forEach(line => {
      const text = line.dataset.text;
      line.innerHTML = text.split('').map(ch =>
        `<span class="name-letter">${ch}</span>`
      ).join('');
    });

    const letters = document.querySelectorAll('.name-letter');
    const lastLetter = letters[letters.length - 1];

    // Stagger the load animation delays
    letters.forEach((el, i) => {
      el.style.animationDelay = (0.3 + i * 0.06) + 's';
    });

    /* ── Mouse repulsion ── */
    const strength = 500, radius = 300, decay = 0.18, maxForce = 2, minDist = 20;
    const state = Array.from(letters).map(() => ({ x: 0, y: 0, vx: 0, vy: 0 }));
    let mouse = { x: -9999, y: -9999 };
    let loadDone = false; // true once the entry animation has finished

    document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    document.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

    /* ── After load animation ends, hand off to JS fully ── */
    lastLetter.addEventListener('animationend', () => {
      letters.forEach(el => {
        el.style.animation = 'none'; // kill CSS animation so it can't fight inline styles
        el.style.opacity   = '1';
        el.style.filter    = 'blur(0px)';
      });
      loadDone = true;
      // Seed the rect cache once letters are settled
      updateLetterRects();
    }, { once: true });

    /* ── Scroll setup ── */
    const nameHero   = document.querySelector('.name-hero');
    const nameKicker = nameHero.querySelector('.name-kicker');
    const nameHint   = nameHero.querySelector('.name-hint');
    const mid = (letters.length - 1) / 2;

    // Shared scroll state — read once per frame in animate(), not in multiple listeners
    let scrollY = window.scrollY;
    let scrollDirty = false;
    window.addEventListener('scroll', () => { scrollY = window.scrollY; scrollDirty = true; }, { passive: true });

    /* ── Cached letter base positions (updated on resize, not every frame) ── */
    // We cache each letter's natural center in page coordinates.
    // The physics offset is then added in the RAF without re-reading the DOM.
    const letterBaseX = new Float32Array(letters.length);
    const letterBaseY = new Float32Array(letters.length);

    function updateLetterRects() {
      // Temporarily zero out transforms so getBoundingClientRect returns natural positions
      letters.forEach(el => { el.style.transform = ''; });
      letters.forEach((el, i) => {
        const r = el.getBoundingClientRect();
        letterBaseX[i] = r.left + r.width  / 2 + scrollY; // convert to page coords
        letterBaseY[i] = r.top  + r.height / 2 + scrollY;
      });
    }

    window.addEventListener('resize', updateLetterRects, { passive: true });

    /* ── Pin bottom-nav once hero scrolls off ── */
    const bottomNav = document.querySelector('.bottom-nav');
    const navLinks  = bottomNav.querySelectorAll('.bottom-nav-item');
    const heroEl    = document.getElementById('hero');
    // Cache hero height so we can derive heroBottom from scrollY without layout reads
    let heroHeight = heroEl.offsetHeight;
    window.addEventListener('resize', () => { heroHeight = heroEl.offsetHeight; }, { passive: true });

    let isPinned    = false;
    let unpinTimer  = null;

    function updateBottomNav(sy) {
      // heroBottom in viewport = heroHeight - sy (hero starts at top of page)
      const heroBottom = heroHeight - sy;
      const shouldPin  = heroBottom <= 0;

      if (shouldPin && !isPinned) {
        if (unpinTimer) { clearTimeout(unpinTimer); unpinTimer = null; }
        bottomNav.classList.add('pinned');
        isPinned = true;
      } else if (!shouldPin && isPinned) {
        bottomNav.classList.add('unpinning');
        unpinTimer = setTimeout(() => {
          bottomNav.classList.remove('pinned', 'unpinning');
          unpinTimer = null;
        }, 350);
        isPinned = false;
      }
    }

    /* ── RAF: physics + scroll-driven spread/scale + scroll side-effects ── */
    let cachedHeroHeightVh = window.innerHeight * 0.7;
    window.addEventListener('resize', () => { cachedHeroHeightVh = window.innerHeight * 0.7; }, { passive: true });

    function animate() {
      const sy     = scrollY; // read shared value set by the passive scroll listener
      const t      = Math.min(sy / cachedHeroHeightVh, 1);
      const scale  = 1 + t * 0.18;
      const spread = t * 0.22;

      // Apply scroll-driven visual effects and nav state only when scroll changed
      if (scrollDirty && loadDone) {
        scrollDirty = false;

        // Parallax
        nameHero.style.transform = `translateY(${-t * 60}px)`;

        // Kicker + hint
        const kh = Math.max(0, 1 - t * 2.5);
        nameKicker.style.opacity = kh;
        nameHint.style.opacity   = kh;

        // Letters: dissolve outward from centre
        for (let i = 0; i < letters.length; i++) {
          const d = mid > 0 ? Math.abs(i - mid) / mid : 0;
          letters[i].style.opacity = Math.max(0, 1 - t * (0.6 + d * 0.7));
          letters[i].style.filter  = `blur(${t * (2 + d * 10)}px)`;
        }

        // Bottom nav pin (no getBoundingClientRect — uses cached heroHeight)
        updateBottomNav(sy);
      }

      // Physics loop — uses cached base positions, no DOM reads
      for (let i = 0; i < letters.length; i++) {
        // Convert page-coord base back to viewport-coord center
        const cx = letterBaseX[i] - sy;
        const cy = letterBaseY[i] - sy;
        const dx = cx - mouse.x, dy = cy - mouse.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < minDist) dist = minDist;
        let fx = 0, fy = 0;
        if (dist < radius) {
          const force = Math.min(strength / (dist * dist), maxForce);
          fx = (dx / dist) * force;
          fy = (dy / dist) * force;
        }
        const s = state[i];
        s.vx = (s.vx + fx) * 0.82; s.vy = (s.vy + fy) * 0.82;
        s.vx -= s.x * decay;        s.vy -= s.y * decay;
        s.x += s.vx;                s.y += s.vy;

        const offsetX = (i - mid) * spread * 1.4 * 16;
        letters[i].style.transform = `translate(${s.x + offsetX}px, ${s.y}px) scale(${scale})`;
      }

      requestAnimationFrame(animate);
    }
    animate();

    /* ── Nav active state on scroll ── */
    const sections = document.querySelectorAll('section[id]');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navLinks.forEach(a => {
            a.classList.toggle('active', a.getAttribute('href') === '#' + entry.target.id);
          });
        }
      });
    }, { threshold: 0.5 });
    sections.forEach(s => observer.observe(s));

    /* ── Render Resume ── */
    const resumeList = document.getElementById('resume-list');
    DATA.resume.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'resume-item';
      el.style.animationDelay = (i * 0.1) + 's';
      el.innerHTML = `
        <div class="resume-meta">
          <span class="resume-period">${item.period}</span>
          <span class="resume-type-badge">${item.type === 'experience' ? 'Experience' : 'Education'}</span>
        </div>
        <div class="resume-content">
          <h3 class="resume-title">${item.title}</h3>
          <p class="resume-org">${item.org}${item.location ? ' · ' + item.location : ''}</p>
          <p class="resume-desc">${item.desc}</p>
          ${item.tags ? `<div class="tag-row">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
        </div>`;
      resumeList.appendChild(el);
    });

    /* ── Render Projects ── */
    const projectsGrid = document.getElementById('projects-grid');
    DATA.projects.forEach((p, i) => {
      const el = document.createElement(p.slug ? 'a' : 'div');
      el.className = 'project-card';
      if (p.slug) {
        el.href = `project.html?slug=${p.slug}`;
        el.style.textDecoration = 'none';
        el.style.color = 'inherit';
        el.style.cursor = 'pointer';
      }
      el.style.animationDelay = (i * 0.12) + 's';
      el.innerHTML = `
        <div class="project-cover">
          <img src="${p.cover}" alt="${p.title}" loading="lazy" onerror="this.parentElement.classList.add('no-cover')">
          <span class="project-type-badge">${p.type}</span>
        </div>
        <div class="project-body">
          <div class="project-header">
            <h3 class="project-title">${p.title}</h3>
            <span class="project-period">${p.period}</span>
          </div>
          <p class="project-desc">${p.desc}</p>
          <div class="tag-row">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>`;
      projectsGrid.appendChild(el);
    });

    /* ── Render About ── */
    document.getElementById('about-bio').textContent = DATA.about.bio;
    const hobbyCardsContainer = document.createElement('div');
    hobbyCardsContainer.className = 'hobby-cards';

    // Photography card
    const photoCard = document.createElement('a');
    photoCard.className = 'hobby-card';
    photoCard.href = 'photography.html';
    photoCard.style.textDecoration = 'none';
    photoCard.style.color = 'inherit';
    photoCard.style.display = 'block';
    photoCard.innerHTML = `
      <div class="hobby-card-cover">
        <img src="media/photography/rome/02.webp" alt="Photography" loading="lazy">
      </div>
      <div class="hobby-card-header">
        <span class="hobby-card-title">Photography</span>
        <span class="hobby-card-kicker">Visual</span>
      </div>`;
    hobbyCardsContainer.appendChild(photoCard);

    document.getElementById('photo-grid')?.remove();
    document.querySelector('.about-body').appendChild(hobbyCardsContainer);

    /* ── Contact form ── */
    const contactForm = document.getElementById('contact-form');
    const contactStatus = document.getElementById('contact-status');

    contactForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = contactForm.querySelector('.contact-btn');
      btn.disabled = true;
      contactStatus.textContent = '';
      contactStatus.className = 'contact-status';

      try {
        const res = await fetch(contactForm.action, {
          method: 'POST',
          body: new FormData(contactForm),
          headers: { Accept: 'application/json' }
        });
        if (res.ok) {
          contactStatus.textContent = 'Message sent.';
          contactStatus.classList.add('contact-status--ok');
          contactForm.reset();
        } else {
          const data = await res.json().catch(() => ({}));
          contactStatus.textContent = data.errors?.[0]?.message || 'Something went wrong.';
          contactStatus.classList.add('contact-status--err');
        }
      } catch {
        contactStatus.textContent = 'Network error — please try again.';
        contactStatus.classList.add('contact-status--err');
      } finally {
        btn.disabled = false;
      }
    });

</script>
</body>
</html>
