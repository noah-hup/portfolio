<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography | Noah Hupfeld</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="project.css">
<link rel="stylesheet" href="photography.css">
</head>
<body>

  <canvas id="noise-canvas" aria-hidden="true"></canvas>
  <div class="scanline" aria-hidden="true"></div>
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="orb orb-3" aria-hidden="true"></div>

  <!-- Fixed nav -->
  <nav class="project-nav" id="project-nav">
    <a href="index.html#about" class="nav-back">
      <span class="nav-back-arrow">←</span>
      <span>Back</span>
    </a>
    <span class="nav-project-title">Photography</span>
  </nav>

  <!-- Hero -->
  <header class="photo-hero">
    <div class="photo-hero-inner">
      <span class="photo-hero-kicker">Visual</span>
      <h1 class="photo-hero-title">Photography</h1>
      <p class="photo-hero-desc">A collection of moments.</p>
    </div>
  </header>

  <!-- Group scroll nav -->
  <nav class="group-nav" id="group-nav" aria-label="Sections"></nav>

  <!-- Masonry / grid -->
  <main class="photo-main" id="photo-main"></main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
    <button class="lightbox-prev" id="lightbox-prev" aria-label="Previous">←</button>
    <button class="lightbox-next" id="lightbox-next" aria-label="Next">→</button>
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" id="lightbox-img" src="" alt="">
    </div>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

  <footer class="site-footer">© 2026 Noah Hupfeld</footer>

  <script src="grain.js"></script>
  <script src="cursor.js"></script>
  <script src="portfolio-data.js"></script>
  <script>
    const GAP = 10; // px between tiles
    const mainEl = document.getElementById('photo-main');

    /* ── Split the flat array into groups ── */
    const rawEntries = DATA.about.photography;
    const groups = []; // [ { label, photos: [] }, ... ]

    rawEntries.forEach(e => {
      const entry = typeof e === 'string' ? { src: e } : e;
      if (entry.type === 'group') {
        groups.push({ label: entry.label, photos: [] });
      } else {
        if (groups.length === 0) groups.push({ label: null, photos: [] });
        groups[groups.length - 1].photos.push(entry);
      }
    });

    /* ── Per-group masonry state ── */
    // groupStates[i] = { container, tiles, pending }
    const groupStates = [];

    /* ── Build DOM: one section per group ── */
    groups.forEach((group, gi) => {
      const section = document.createElement('div');
      section.className = 'photo-group';

      if (group.label) {
        const heading = document.createElement('h2');
        heading.className = 'photo-group-label';
        heading.textContent = group.label;
        section.appendChild(heading);
      }

      const gridEl = document.createElement('div');
      gridEl.className = 'photo-grid';
      section.appendChild(gridEl);
      mainEl.appendChild(section);

      const tiles = group.photos.map((entry, i) => {
        const div = document.createElement('div');
        div.className = 'photo-tile';
        div.style.animationDelay = (0.04 + i * 0.06) + 's';
        div.style.position = 'absolute';
        const img = document.createElement('img');
        img.src = entry.src;
        img.alt = entry.alt || 'Photo ' + (i + 1);
        img.loading = 'lazy';
        div.appendChild(img);
        div.addEventListener('click', () => {
          const visibleTiles = tiles.filter(t => !t.hidden);
          const vi = visibleTiles.indexOf(tiles[i]);
          if (vi !== -1) openLightbox(vi, visibleTiles);
        });
        gridEl.appendChild(div);
        return { div, entry, aspect: entry.aspect || null, hidden: false };
      });

      const state = { gridEl, tiles, pending: tiles.filter(t => t.aspect === null).length };
      groupStates.push(state);

      function tryLayout() {
        if (state.pending > 0) return;
        layoutGroup(state);
      }

      tiles.forEach(t => {
        if (t.aspect !== null) return;
        const img = t.div.querySelector('img');
        if (img.complete && img.naturalWidth) {
          t.aspect = img.naturalWidth / img.naturalHeight || 1;
          state.pending--;
          tryLayout();
        } else {
          img.addEventListener('load', () => {
            t.aspect = img.naturalWidth / img.naturalHeight || 1;
            state.pending--;
            tryLayout();
          });
          img.addEventListener('error', () => {
            t.aspect = 1;
            state.pending--;
            tryLayout();
          });
        }
      });

      if (state.pending === 0) layoutGroup(state);
    });

    /* ── Column count based on grid element width ── */
    function colCount(w) {
      if (w >= 900) return 3;
      if (w >= 520) return 2;
      return 1;
    }

    /* ── Column-packing layout for a single group ── */
    function layoutGroup(state) {
      const totalW = state.gridEl.clientWidth;
      const cols   = colCount(totalW);
      const colW   = (totalW - GAP * (cols - 1)) / cols;
      const colHeights = Array(cols).fill(0);

      state.tiles.forEach(t => {
        if (t.hidden) return;
        let shortest = 0;
        for (let c = 1; c < cols; c++) {
          if (colHeights[c] < colHeights[shortest]) shortest = c;
        }
        const h = colW / (t.aspect || 1);
        t.div.style.left   = shortest * (colW + GAP) + 'px';
        t.div.style.top    = colHeights[shortest] + 'px';
        t.div.style.width  = colW + 'px';
        t.div.style.height = h + 'px';
        colHeights[shortest] += h + GAP;
      });

      state.gridEl.style.height = Math.max(...colHeights) + 'px';
    }

    function layoutAll() {
      groupStates.forEach(s => { if (s.pending === 0) layoutGroup(s); });
    }

    /* ── Re-layout on resize ── */
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(layoutAll, 120);
    }, { passive: true });

    /* ── Nav shrink on scroll ── */
    const projNav = document.getElementById('project-nav');

    /* ── Group scroll nav ── */
    const groupNav = document.getElementById('group-nav');

    // Build one nav item per labelled group; store ref to its section el
    const navItems = []; // { el, sectionEl, label }
    groupStates.forEach((state, gi) => {
      if (!groups[gi].label) return;
      const btn = document.createElement('button');
      btn.className = 'group-nav-item';
      btn.textContent = groups[gi].label;
      btn.addEventListener('click', () => {
        state.gridEl.closest('.photo-group').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      groupNav.appendChild(btn);
      navItems.push({ el: btn, sectionEl: state.gridEl.closest('.photo-group'), label: groups[gi].label });
    });

    // Opacity/blur by distance from active index
    // dist: 0=active, 1=±1, 2=±2, 3+=hidden
    const DIST_STYLE = [
      { opacity: 1,    blur: 0,   scale: 1     },   // active
      { opacity: 0.55, blur: 0,   scale: 0.95  },   // ±1
      { opacity: 0.2,  blur: 2,   scale: 0.9   },   // ±2
      { opacity: 0,    blur: 6,   scale: 0.85  },   // ±3+ (invisible)
    ];

    let activeGroupIdx = 0;

    function updateNavItems() {
      navItems.forEach((item, i) => {
        const dist = Math.min(Math.abs(i - activeGroupIdx), 3);
        const s = DIST_STYLE[dist];
        item.el.style.opacity   = s.opacity;
        item.el.style.filter    = s.blur > 0 ? `blur(${s.blur}px)` : '';
        item.el.style.transform = `scale(${s.scale})`;
        item.el.classList.toggle('active', dist === 0);
        // pointer-events: off for invisible items
        item.el.style.pointerEvents = dist >= 3 ? 'none' : '';
      });
    }

    function findActiveGroup() {
      // Active = the group whose section top is closest to 40% down the viewport
      const trigger = window.scrollY + window.innerHeight * 0.4;
      let best = 0;
      navItems.forEach((item, i) => {
        const top = item.sectionEl.getBoundingClientRect().top + window.scrollY;
        if (top <= trigger) best = i;
      });
      return best;
    }

    updateNavItems();

    // Show/hide nav on scroll activity
    let navHideTimer;
    let lastScrollY = window.scrollY;
    let navVisible = false;

    function showNav() {
      if (!navVisible) {
        navVisible = true;
        groupNav.classList.add('visible');
      }
      clearTimeout(navHideTimer);
      navHideTimer = setTimeout(() => {
        navVisible = false;
        groupNav.classList.remove('visible');
      }, 1400);
    }

    window.addEventListener('scroll', () => {
      projNav.classList.toggle('scrolled', window.scrollY > 60);

      // Only show nav after hero is past
      if (window.scrollY > 120) showNav();

      const newActive = findActiveGroup();
      if (newActive !== activeGroupIdx) {
        activeGroupIdx = newActive;
        updateNavItems();
      }
      lastScrollY = window.scrollY;
    }, { passive: true });

    /* ── Lightbox (operates on visible subset) ── */
    let currentVisible = [];
    let current = 0;
    const lightbox  = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lightbox-img');
    const lbCounter = document.getElementById('lightbox-counter');

    function openLightbox(i, visibleTiles) {
      currentVisible = visibleTiles;
      current = i;
      lbImg.src = currentVisible[i].entry.src;
      lbCounter.textContent = (i + 1) + ' / ' + currentVisible.length;
      lightbox.classList.add('open');
      lightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightbox.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function showPrev() { openLightbox((current - 1 + currentVisible.length) % currentVisible.length); }
    function showNext() { openLightbox((current + 1) % currentVisible.length); }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-prev').addEventListener('click', showPrev);
    document.getElementById('lightbox-next').addEventListener('click', showNext);

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   showPrev();
      if (e.key === 'ArrowRight')  showNext();
    });
  </script>
</body>
</html>
